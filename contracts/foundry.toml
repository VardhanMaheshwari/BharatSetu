[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
amoy    = "${AMOY_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
amoy    = { key = "${POLYGONSCAN_API_KEY}", url = "https://api-amoy.polygonscan.com/api" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
